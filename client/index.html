<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShortcutGenius - AI-Powered iOS Shortcuts</title>
    <meta name="description" content="Create, analyze, and optimize iOS Shortcuts using AI with support for multiple AI models" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Critical CSS - Prevents white flash -->
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
      }

      /* Default to dark theme to match most users */
      body {
        background-color: hsl(222.2, 84%, 4.9%);
        color: hsl(210, 40%, 98%);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      /* Light mode for users who prefer it */
      @media (prefers-color-scheme: light) {
        body {
          background-color: hsl(0, 0%, 100%);
          color: hsl(222.2, 84%, 4.9%);
        }
      }

      /* Loading state */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 1rem;
      }

      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid hsl(217.2, 32.6%, 17.5%);
        border-top-color: hsl(210, 40%, 98%);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @media (prefers-color-scheme: light) {
        .app-loading-spinner {
          border-color: hsl(214.3, 31.8%, 91.4%);
          border-top-color: hsl(222.2, 84%, 4.9%);
        }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .app-loading-text {
        font-size: 14px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading state shown until React takes over -->
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
        <div class="app-loading-text">Loading ShortcutGenius...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
